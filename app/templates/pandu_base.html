<!DOCTYPE html>
<html>

<head>
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/pandu.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/pandu.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


</head>

<body>

    <div class="wrapper">

        <div class="sidebar">

            <div class="logo">
                <h2>Pasumpon Chit</h2>
            </div>

            <ul class="menu">

                <li class="{% if active_page=='dashboard' %}active{% endif %}">
                    <a href="/pandu">
                        <i class="fas fa-home"></i>
                        Dashboard
                    </a>
                </li>

                <li class="{% if active_page=='pending_members' %}active{% endif %}">
                    <a href="/pending-members-list">
                        <i class="fas fa-list"></i>
                        Pending Members List
                    </a>
                </li>

                <li class="{% if active_page=='pandu-collection-summary' %}active{% endif %}">
                    <a href="/pandu-collection-summary">
                        <i class="fas fa-users"></i>
                        Collection Summary
                    </a>
                </li>

                <li class="{% if active_page=='datewise_collection' %}active{% endif %}">
                    <a href="/datewise-collection-list">
                        <i class="fas fa-calendar-check"></i>
                        Date Wise Collection
                    </a>
                </li>

                <li class="{% if active_page=='monthly_report' %}active{% endif %}">
                    <a href="/monthly-report">
                        <i class="fas fa-calendar-alt"></i>
                        Monthly Collection
                    </a>
                </li>

                <li class="{% if active_page=='member_analysis' %}active{% endif %}">
                    <a href="/reports/member-analysis">
                        <i class="fas fa-chart-pie"></i>
                        Member Analysis
                    </a>
                </li>

                <li class="{% if active_page=='pandu_settlement' %}active{% endif %}">
                    <a href="/pandu-settlement-list">
                        <i class="fas fa-file-invoice-dollar"></i>
                        Settlement List
                    </a>
                </li>



                <li class="exit-menu">
                    <a href="/dashboard-live">
                        <i class="fas fa-arrow-left"></i>
                        Exit to Main Dashboard
                    </a>
                </li>
            </ul>

        </div>

        <main class="main-content">

            {% block content %}
            {% endblock %}

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
