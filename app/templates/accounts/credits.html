{% extends "pandu_base.html" %}

{% block content %}

<div class="container-fluid py-4">

    <div class="card shadow mb-4">

        <div class="card-header bg-success text-white">

            <h4 class="mb-0">
                Credits Entry
            </h4>

        </div>

        <div class="card-body">

            <form
                method="post"
                action="/accounts/credits/save">

                <div class="row g-3">

                    <div class="col-md-2">

                        <label>Date</label>

                        <input
                            type="date"
                            name="transaction_date"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-3">

                        <label>Category</label>

                        <select
                            name="category"
                            class="form-select"
                            required>

                            {% for c in categories %}

                            <option>
                                {{c.category_name}}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-2">

                        <label>Amount</label>

                        <input
                            type="number"
                            step="0.01"
                            name="amount"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-2">

                        <label>Payment Mode</label>

                        <select
                            name="payment_mode"
                            class="form-select">

                            <option>CASH</option>
                            <option>GPAY</option>
                            <option>BANK</option>

                        </select>

                    </div>

                    <div class="col-md-3">

                        <label>Remarks</label>

                        <input
                            type="text"
                            name="remarks"
                            class="form-control">

                    </div>

                </div>

                <div class="mt-3">

                    <button
                        class="btn btn-success">

                        Save Credit

                    </button>

                </div>

            </form>

        </div>

    </div>


    <div class="card shadow">

    <div class="card-header bg-dark text-white">

        Recent Credits

    </div>

    <div class="card-body p-0">

        <table class="table table-bordered mb-0">

            <thead class="table-dark">

                <tr>

                    <th>Date</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Mode</th>
                    <th>Remarks</th>

                </tr>

            </thead>

            <tbody>

                {% for row in transactions %}

                <tr>

                    <td>{{row.transaction_date}}</td>

                    <td>{{row.category}}</td>

                    <td class="text-end">
                        ₹{{row.amount}}
                    </td>

                    <td>{{row.payment_mode}}</td>

                    <td>{{row.remarks}}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</div>

{% endblock %}
