<!DOCTYPE html>

<html>

<head>

    <title>Pending Members Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @page {
            size: A4;
            margin: 10mm;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 11px;
            color: #000;
            margin: 0;
            padding: 5mm;
        }

        .report-container {

            width: 100%;

            max-width: 100%;

            margin: 0 auto;

            padding: 10px;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 18px;
            margin: 0;
        }

        .header h3 {
            font-size: 12px;
            margin: 2px 0;
        }

        .report-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 13px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        table th {
            background: #0d6efd !important;
            color: white !important;
            border: 1px solid #000 !important;
            text-align: center;
            padding: 6px;
        }

        table td {
            border: 1px solid #000 !important;
            padding: 5px;
        }

        .text-right {
            text-align: right;
        }

        .footer {
            margin-top: 15px;
            font-size: 11px;
            text-align: right;
        }

        .print-btn {
            margin-bottom: 15px;
        }

        @media print {

            .no-print {
                display: none !important;
            }

            thead {
                display: table-header-group;
            }

            tr {
                page-break-inside: avoid;
            }
        }
    </style>


</head>

<body>

    <div class="text-center no-print print-btn">

        <button class="btn btn-primary" onclick="window.print()">

            Print Report

        </button>

    </div>

    <div class="header">

        <h1>PASUMPON CHIT FUND</h1>

        <h3>Pending Members Report</h3>

    </div>

    <div class="report-info">

        <div>
            Date :
            <span id="printDate"></span>
        </div>

        <div>
            Total Members :
            <span id="totalMembers">0</span>
        </div>

        <div>
            Total Pending :
            <span id="totalPending">₹0</span>
        </div>

    </div>

    <table class="table table-bordered">

        <thead>

            <tr>

                <th style="width:5%">No</th>

                <th style="width:10%">Code</th>

                <th style="width:24%">Member Name</th>

                <th style="width:14%">Mobile</th>

                <th style="width:14%">Group</th>

                <th style="width:10%">Due</th>

                <th style="width:9%">Months</th>

                <th style="width:14%">Pending</th>

            </tr>

        </thead>

        <tbody id="reportBody">

        </tbody>

        <tfoot>

            <tr style="background:#f2f2f2;">


                <td colspan="7" style="
    text-align:right;
    font-weight:bold;
    font-size:12px;">

                    TOTAL PENDING AMOUNT

                </td>

                <td id="grandTotalPending" style="
    text-align:right;
    font-weight:bold;
    font-size:12px;">

                    ₹0

                </td>


            </tr>

        </tfoot>


    </table>

    <div class="footer">

        Generated by Pasumpon Chit Software

    </div>


    <script>

        document.getElementById(
            "printDate"
        ).innerText =
            new Date().toLocaleString();

        async function loadReport() {

            const response =
                await fetch(
                    "/api/pending-members-list"
                );

            const data =
                await response.json();

            let html = "";

            let totalPending = 0;

            data.forEach((row, index) => {

                totalPending +=
                    Number(row.total_pending || 0);

                html += `

        <tr>

            <td>${index + 1}</td>

            <td>${row.member_code}</td>

            <td>${row.member_name}</td>

            <td>${row.mobile || ''}</td>

            <td>${row.group_name}</td>

            <td class="text-right">
                ₹${Number(row.group_monthly_due).toLocaleString()}
            </td>

            <td style="text-align:center;">
                ${row.pending_months}
            </td>

            <td class="text-right">
                ₹${Number(row.total_pending).toLocaleString()}
            </td>

        </tr>

        `;
            });

            document.getElementById(
                "reportBody"
            ).innerHTML = html;

            document.getElementById(
                "totalMembers"
            ).innerText = data.length;

            document.getElementById(
                "totalPending"
            ).innerText =
                "₹" + totalPending.toLocaleString();

            document.getElementById(
                "grandTotalPending"
            ).innerText =
                "₹" + totalPending.toLocaleString();

        }

        loadReport();

    </script>

</body>

</html>
